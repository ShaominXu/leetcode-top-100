name: Test Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build site
        run: mkdocs build --strict

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site
          retention-days: 7

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Adjust mkdocs config for staging
        run: |
          python3 << 'PY'
          # 修改site_url为staging环境的URL
          with open('mkdocs.yml', 'r', encoding='utf-8') as f:
              lines = f.readlines()
          
          new_lines = []
          for line in lines:
              if 'site_url: https://shaominxu.github.io/leetcode-top-100/' in line:
                  line = line.replace(
                      'site_url: https://shaominxu.github.io/leetcode-top-100/',
                      'site_url: https://shaominxu.github.io/leetcode-top-100/staging/'
                  )
              new_lines.append(line)
          
          with open('mkdocs.yml', 'w', encoding='utf-8') as f:
              f.writelines(new_lines)
          PY

      - name: Build site
        run: mkdocs build --strict

      - name: Deploy to gh-pages staging
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: staging
          cname: false
