<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">锤子打铁</title>
  <desc id="desc">一把铁锤正在锻打铁砧，火花飞溅，象征千锤百炼。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2233"/>
      <stop offset="100%" stop-color="#3b1f2e"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9dde6"/>
      <stop offset="100%" stop-color="#8b95a7"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b07b43"/>
      <stop offset="100%" stop-color="#6f4725"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff6f00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="520" fill="url(#bg)" rx="24"/>

  <ellipse cx="450" cy="430" rx="320" ry="56" fill="#121521" opacity="0.72"/>

  <ellipse cx="450" cy="330" rx="190" ry="90" fill="url(#glow)"/>

  <g transform="translate(170 214)">
    <rect x="0" y="120" width="560" height="40" rx="12" fill="#2a3042"/>
    <rect x="250" y="20" width="68" height="108" rx="8" fill="url(#metal)"/>
    <rect x="180" y="0" width="208" height="36" rx="10" fill="url(#metal)"/>
    <rect x="188" y="8" width="192" height="8" rx="4" fill="#f3f5f9" opacity="0.55"/>
  </g>

  <g transform="rotate(-27 550 180)">
    <rect x="492" y="80" width="36" height="220" rx="16" fill="url(#handle)"/>
    <rect x="462" y="48" width="98" height="48" rx="12" fill="url(#metal)"/>
    <rect x="470" y="56" width="82" height="10" rx="5" fill="#f8faff" opacity="0.6"/>
  </g>

  <g fill="#ffcc55" opacity="0.9">
    <circle cx="510" cy="238" r="7"/>
    <circle cx="540" cy="226" r="5"/>
    <circle cx="568" cy="248" r="6"/>
    <circle cx="488" cy="258" r="5"/>
  </g>

  <g stroke="#ffcf66" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <line x1="536" y1="244" x2="580" y2="210"/>
    <line x1="520" y1="250" x2="560" y2="280"/>
    <line x1="502" y1="246" x2="470" y2="208"/>
    <line x1="496" y1="262" x2="456" y2="294"/>
  </g>
</svg>
