site_name: 算法百炼
site_description: LeetCode high-frequency problem notes
site_url: https://xusm.github.io/leetcode-top-100/
repo_url: https://github.com/xusm/leetcode-top-100
repo_name: xusm/leetcode-top-100

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: purple
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

plugins:
  - search

docs_dir: docs2

nav:
  - 首页: index.md
  - 数组:
      - 48. 旋转图像: 48-旋转图像.md
      - 54. 螺旋矩阵: 54-螺旋矩阵.md
      - 59. 螺旋矩阵 II: 59-螺旋矩阵II.md
  - 动态规划:
      - 53. 最大子数组和: 53-最大子数组和.md
