theme:
  name: material
  language: zh
  icon:
    repo: fontawesome/brands/github
  palette:
  - scheme: default
    primary: light blue
    accent: indigo
  features:
  - navigation.top
  - search.suggest
  - search.highlight
  - content.code.copy
  - content.tabs.link
markdown_extensions:
- admonition
- toc:
