- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight
- pymdownx.superfences
- pymdownx.inlinehilite
- pymdownx.details
plugins:
- search
extra_css:
- stylesheets/extra.css
docs_dir: docs
