site_name: 算法百炼
site_description: LeetCode high-frequency problem notes
site_url: https://shaominxu.github.io/LeetCode-Top-100/
repo_url: https://github.com/ShaominXu/LeetCode-Top-100
repo_name: ShaominXu/LeetCode-Top-100

theme:
  name: material
  language: zh
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: purple
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

plugins:
  - search

extra_css:
  - stylesheets/extra.css

docs_dir: docs2

nav:
  - 首页: index.md
  - 数组:
    - 普通数组: 普通数组.md
    - 二分法: 二分法.md
    - 区间: 区间.md
    - 矩阵:
      - 48. 旋转图像: 48-旋转图像.md
      - 54. 螺旋矩阵: 54-螺旋矩阵.md
      - 59. 螺旋矩阵 II: 59-螺旋矩阵II.md
  - 字符串: 字符串.md
  - 数据结构:
    - 堆: 堆.md
    - 栈和队列: 栈和队列.md
    - 链表: 链表.md
    - 哈希表: 哈希表.md
  - 回溯: 回溯.md
  - 动态规划:
      - 总览: 动态规划.md
      - 53. 最大子数组和: 53-最大子数组和.md
  - 贪心算法: 贪心算法.md
  - 图论: 图论.md
