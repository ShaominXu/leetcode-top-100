site_name: 算法百炼
site_description: LeetCode high-frequency problem notes
site_url: https://xusm.github.io/LeetCode-Top-100/
repo_url: https://github.com/xusm/LeetCode-Top-100
repo_name: xusm/LeetCode-Top-100

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: purple
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

plugins:
  - search

nav:
  - 首页: index.md
  - 数组:
    - 普通数组: topics/array/index.md
    - 矩阵:
      - 48. 旋转图像: topics/array/48-旋转图像.md
      - 54. 螺旋矩阵: topics/array/54-螺旋矩阵.md
      - 59. 螺旋矩阵 II: topics/array/59-螺旋矩阵II.md
    - 区间: topics/array/interval.md
    - 二分查找: topics/array/binary-search.md
    - 字符串: topics/array/string.md
  - 数据结构:
    - 堆: topics/heap/index.md
    - 栈和队列: topics/stack-queue/index.md
    - 链表: topics/linked-list/index.md
    - 哈希: topics/hash/index.md
    - 二叉树: topics/binary-tree/index.md
  - 回溯: topics/backtracking/index.md
  - 动态规划: topics/dp/index.md
  - 贪心算法: topics/greedy/index.md
  - 图论: topics/graph/index.md
